schemaVersion: 1
kind: Job
metadata:
  name: job_batch_review_cycle
spec:
  state: enabled
  default_input:
    base: main
  max_active_runs: 1
  steps:
    - id: review
      target_type: activity
      target_id: agent_batch_review
      executor: claude
      model_tier: weak
      condition: on_success
      timeout_seconds: 600
    - id: sync_reviews
      target_type: activity
      target_id: pr_sync_reviews
      condition: on_success
      timeout_seconds: 120
    - id: gate
      target_type: activity
      target_id: check_task_value
      default_input:
        field: pr_status
        expected: APPROVED
        scope: all
        normalize: true
        fail_on_mismatch: true
      condition: on_success
      timeout_seconds: 30
    - id: fix_loop
      target_type: job
      target_id: job_batch_review_loop
      condition: on_failure
      timeout_seconds: 7200
    - id: merge
      target_type: activity
      target_id: git_merge
      default_input:
        strategy: pr_merge
      condition: on_success
      timeout_seconds: 60
    - id: cleanup
      target_type: activity
      target_id: worktree_cleanup
      condition: on_success
      timeout_seconds: 30
