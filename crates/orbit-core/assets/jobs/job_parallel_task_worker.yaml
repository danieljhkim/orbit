schemaVersion: 1
kind: Job
metadata:
  name: job_parallel_task_worker
spec:
  state: enabled
  default_input:
    base: main
    verification_mode: deferred
  max_active_runs: 16
  steps:
    - id: implement
      target_type: activity
      target_id: agent_implement
      executor: codex
      model_tier: strong
      condition: on_success
      timeout_seconds: 4000
    - id: update_task
      target_type: activity
      target_id: update_task
      default_input:
        status: review
      condition: on_success
      timeout_seconds: 15
