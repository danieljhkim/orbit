schemaVersion: 1
kind: Job
metadata:
  name: job_batch_review_loop
spec:
  state: enabled
  default_input:
    base: main
  max_active_runs: 1
  max_iterations: 5
  steps:
    - id: pull
      target_type: activity
      target_id: git_pull
      condition: always
      timeout_seconds: 120
    - id: fix
      target_type: activity
      target_id: agent_implement_fix
      executor: codex
      model_tier: strong
      condition: always
      timeout_seconds: 2000
    - id: sync_reviews_pre
      target_type: activity
      target_id: pr_sync_reviews
      condition: on_success
      timeout_seconds: 120
    - id: commit
      target_type: activity
      target_id: git_commit
      default_input:
        scope: all
      condition: on_success
      timeout_seconds: 60
    - id: push
      target_type: activity
      target_id: git_push
      condition: on_success
      timeout_seconds: 120
    - id: review
      target_type: activity
      target_id: agent_batch_review
      executor: claude
      model_tier: weak
      condition: on_success
      timeout_seconds: 1000
    - id: sync_reviews_post
      target_type: activity
      target_id: pr_sync_reviews
      condition: on_success
      timeout_seconds: 120
    - id: gate
      target_type: activity
      target_id: check_task_value
      default_input:
        field: pr_status
        expected: APPROVED
        scope: all
        normalize: true
      condition: on_success
      timeout_seconds: 30
