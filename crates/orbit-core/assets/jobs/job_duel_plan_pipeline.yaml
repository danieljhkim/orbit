schemaVersion: 1
kind: Job
metadata:
  name: job_duel_plan_pipeline
spec:
  state: enabled
  default_input:
    base: main
  max_active_runs: 1
  max_iterations: 1
  steps:
    - id: planning_duel
      target_type: activity
      target_id: run_planning_duel
      condition: on_success
      timeout_seconds: 3600
