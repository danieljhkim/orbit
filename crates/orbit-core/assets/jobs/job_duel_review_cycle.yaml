schemaVersion: 1
kind: Job
metadata:
  name: job_duel_review_cycle
spec:
  state: enabled
  default_input:
    base: main
  max_active_runs: 1
  max_iterations: 1
  steps:
    - id: review
      target_type: activity
      target_id: agent_review
      default_input:
        agent_cli_from_input: reviewer_agent_cli
        model_from_input: reviewer_model
      condition: on_success
      timeout_seconds: 1000
    - id: sync_reviews
      target_type: activity
      target_id: pr_sync_reviews
      condition: on_success
      timeout_seconds: 120
      upstream:
        - review
    - id: arbitrate
      target_type: activity
      target_id: agent_arbitrate
      default_input:
        agent_cli_from_input: arbiter_agent_cli
        model_from_input: arbiter_model
      condition: on_success
      timeout_seconds: 900
      upstream:
        - sync_reviews
    - id: gate
      target_type: activity
      target_id: check_task_value
      default_input:
        field: decision
        expected: APPROVED
        scope: input
      condition: on_success
      timeout_seconds: 30
      upstream:
        - arbitrate
    - id: fix_loop
      target_type: job
      target_id: job_duel_review_loop
      condition: "{{steps.gate.output.match}} == false"
      timeout_seconds: 7200
      upstream:
        - gate
    - id: merge
      target_type: activity
      target_id: git_merge
      default_input:
        strategy: pr_merge
      condition: "{{steps.gate.output.match}} == true || {{steps.fix_loop.state.status}} == success"
      timeout_seconds: 60
      upstream:
        - fix_loop
    - id: cleanup
      target_type: activity
      target_id: worktree_cleanup
      condition: on_success
      timeout_seconds: 30
      upstream:
        - merge
        - record_scores
    - id: record_scores
      target_type: activity
      target_id: record_duel_scores
      condition: always
      timeout_seconds: 60
      upstream:
        - merge
