schemaVersion: 1
kind: Job
metadata:
  name: job_duel_pipeline
spec:
  state: enabled
  default_input:
    base: main
    branch_prefix: duel
  max_active_runs: 1
  max_iterations: 1
  steps:
    - id: select_roles
      target_type: activity
      target_id: select_duel_roles
      condition: on_success
      timeout_seconds: 30
    - id: worktree_setup
      target_type: activity
      target_id: worktree_setup
      condition: on_success
      timeout_seconds: 60
    - id: implement
      target_type: activity
      target_id: agent_implement
      default_input:
        agent_cli_from_input: implementer_agent_cli
        model_from_input: implementer_model
      condition: on_success
      timeout_seconds: 5400
    - id: commit
      target_type: activity
      target_id: git_commit
      default_input:
        scope: per_task
      condition: on_success
      timeout_seconds: 120
    - id: push
      target_type: activity
      target_id: git_push
      condition: on_success
      timeout_seconds: 120
    - id: open_pr
      target_type: activity
      target_id: pr_open
      condition: on_success
      timeout_seconds: 120
    - id: review_cycle
      target_type: job
      target_id: job_duel_review_cycle
      condition: on_success
      timeout_seconds: 7200
