schemaVersion: 1
kind: Job
metadata:
  name: job_duel_review_loop
spec:
  state: enabled
  default_input:
    base: main
  max_active_runs: 1
  max_iterations: 3
  steps:
    - id: pull
      target_type: activity
      target_id: git_pull
      condition: always
      timeout_seconds: 120
    - id: fix
      target_type: activity
      target_id: agent_implement_fix
      condition: always
      timeout_seconds: 2000
    - id: sync_reviews_pre
      target_type: activity
      target_id: pr_sync_reviews
      condition: on_success
      timeout_seconds: 120
    - id: commit
      target_type: activity
      target_id: git_commit
      default_input:
        scope: all
      condition: on_success
      timeout_seconds: 60
    - id: push
      target_type: activity
      target_id: git_push
      condition: on_success
      timeout_seconds: 120
    - id: review
      target_type: activity
      target_id: agent_review
      default_input:
        agent_cli_from_input: reviewer_agent_cli
        model_from_input: reviewer_model
      condition: on_success
      timeout_seconds: 1000
    - id: sync_reviews_post
      target_type: activity
      target_id: pr_sync_reviews
      condition: on_success
      timeout_seconds: 120
    - id: arbitrate
      target_type: activity
      target_id: agent_arbitrate
      default_input:
        agent_cli_from_input: arbiter_agent_cli
        model_from_input: arbiter_model
      condition: on_success
      timeout_seconds: 900
    - id: gate
      target_type: activity
      target_id: check_task_value
      default_input:
        field: decision
        expected: APPROVED
        scope: input
      condition: on_success
      timeout_seconds: 30
