schemaVersion: 1
kind: Job
metadata:
  name: job_parallel_task_pipeline
spec:
  state: enabled
  default_input:
    base: main
    parallelism: 3
  max_active_runs: 3
  steps:
    - id: graph_update
      target_type: activity
      target_id: run_command
      default_input:
        command: orbit graph update
      timeout_seconds: 120
    - id: dispatch
      target_type: activity
      target_id: dispatch_batch
      timeout_seconds: 120
    - id: plan
      target_type: activity
      target_id: agent_plan
      executor: claude
      model_tier: strong
      condition: on_success
      timeout_seconds: 1800
    - id: workers
      target_type: activity
      target_id: parallel_dispatch_tasks
      condition: on_success
      timeout_seconds: 7200
    - id: commit_per_task
      target_type: activity
      target_id: git_commit
      default_input:
        scope: per_task
      condition: on_success
      timeout_seconds: 300
    - id: finalize
      target_type: activity
      target_id: finalize_tasks
      executor: gemini
      model_tier: strong
      condition: on_success
      timeout_seconds: 3600
    - id: commit_finalize
      target_type: activity
      target_id: git_commit
      default_input:
        scope: per_task_finalize
      condition: on_success
      timeout_seconds: 300
    - id: open_pr
      target_type: activity
      target_id: pr_open
      condition: on_success
      timeout_seconds: 300
    - id: review_cycle
      target_type: job
      target_id: job_batch_review_cycle
      condition: on_success
      timeout_seconds: 7200
