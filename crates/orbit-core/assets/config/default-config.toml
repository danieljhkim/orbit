[execution.env]
inherit = false
# Baseline env vars passed to agent subprocesses.
# User-specific vars (GITHUB_TOKEN, ANTHROPIC_API_KEY, etc.) are opt-in — add them as needed.
pass = [
    "HOME",
    "PATH",
    "CODEX_HOME",
    "TMPDIR",
    "USER",
    "__CF_USER_TEXT_ENCODING",  # macOS: required by CoreFoundation
]

[execution.codex]
sandbox = "workspace-write"
# Optional: enable escalation requests for workflows that legitimately need approval.
# approval_policy = "on-request"

[task.approval]
required_for_agent = true
delegate_approval = true

[agents.claude]
strong = "opus-4.6"
weak = "sonnet-4.6"

[agents.codex]
strong = "gpt-5.4"
weak = "gpt-5.4-mini"

[agents.gemini]
strong = "gemini-3.1-pro-preview"
weak = "gemini-3-flash-preview"

[workflow.ship]
plan = { agent = "claude", model = "opus-4.6" }
implement = { agent = "codex", model = "gpt-5.4" }
review = { agent = "claude", model = "sonnet-4.6" }
finalize = { agent = "gemini", model = "gemini-3.1-pro-preview" }

[scoring]
enabled = false

[graph]
editing = false
