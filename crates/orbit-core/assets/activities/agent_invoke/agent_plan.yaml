schemaVersion: 1
kind: Activity
metadata:
  name: agent_plan
spec:
  spec_type: agent_invoke
  description: Author or refine task plans for an already-dispatched batch, handling partial planning failures without losing the whole batch.
  input_schema_json:
    type: object
    properties:
      run_id:
        type: string
        description: Job run ID, used as batch_id for the selected batch.
      base:
        type: string
        description: Shared pipeline base branch input.
      parallelism:
        type: integer
        minimum: 1
      task_ids:
        type: array
        items:
          type: string
        description: Exact task IDs selected by the preceding dispatch step.
  output_schema_json:
    type: object
    properties: {}
  instruction: |
    Only use skills listed in this activity's skill_refs. Ignore all others.

    You are planning tasks for a batch. The dispatch step already selected and tagged
    a conflict-free batch. Your job is to author or refine per-task plans without
    discarding successful planning work when one task goes sideways.

    1. Handle the empty-batch case:
       - If input.task_ids is absent or empty, exit immediately.

    2. Load exactly the selected tasks:
       - Call orbit.task.show for each id in input.task_ids.
       - Do not call orbit.task.list to add more tasks.
       - Confirm each loaded task is still associated with input.run_id via batch_id.
         If a task is no longer tagged to this run, drop it and continue.

    3. Partition the loaded tasks:
       - needs_plan: plan is empty, blank, or placeholder text such as
         "To be authored by executing agent at start time."
       - has_plan: plan is already substantive.

    4. Plan each surviving task independently:
       - Do not assume a provider-specific subagent API. If the runtime clearly supports
         native parallel helpers you may use them, but this activity must also work
         correctly when you do the planning passes yourself in one session.
       - Build selectors from each task's current context_files and use orbit.graph.pack
         as your primary code-reading mechanism.
       - If pack reports `knowledge_unavailable`, or specific selectors are unresolved,
         fall back to fs.read only for the affected files. Use orbit.graph.search,
         orbit.graph.show, orbit.graph.overview, and orbit.graph.refs as needed.
       - If one task cannot be planned confidently, return only that task to backlog via
         orbit.task.update with `status: "backlog"` and `batch_id: ""`, add a concise
         comment, and continue with the rest of the batch.

       needs_plan working-notes requirements:
       - Use task id, title, description, acceptance_criteria, and context_files.
       - Read the referenced code, understand the affected area, and produce markdown
         with exactly `## Plan`, `## Context Files`, and `## Risks`.

       has_plan working-notes requirements:
       - Use task id, title, description, acceptance_criteria, existing plan, and current
         context_files.
       - Validate or refine context_files without rewriting the plan unless the plan is
         clearly invalid or stale.
       - Produce markdown with exactly `## Context Files` and `## Risks`.

    5. Validate your per-task planning notes:
       - needs_plan tasks must produce:
         - `## Plan`
         - `## Context Files` with one exact file path per line
         - `## Risks`
       - has_plan tasks must produce:
         - `## Context Files` with one exact file path per line
         - `## Risks`

    6. Re-check conflicts after refinement:
       - Call `orbit.task.locks` to load the current lock view. Treat the returned
         `locked_files` as occupied using the same path-prefix rule as dispatch.
       - Verify the refined context_files across the surviving batch are still disjoint
         from each other and from those locked active-work paths.
       - If two batch tasks now overlap, keep the task that needs the overlapping file most,
         return the other task to backlog via orbit.task.update with `status: "backlog"`
         and `batch_id: ""`, add a brief explanatory comment, and continue.
       - If a batch task now overlaps with an active locked task from `orbit.task.locks`,
         return that batch task to backlog via orbit.task.update with `status: "backlog"`
         and `batch_id: ""`, add a brief explanatory comment, and continue.

    7. Persist results:
       - For needs_plan tasks: orbit.task.update with the new `plan`, refined
         `context_files`, and a concise comment.
       - For has_plan tasks: orbit.task.update with refined `context_files` and a concise
         comment that the existing plan was preserved.
       - For dropped tasks: orbit.task.update with `status: "backlog"`, `batch_id: ""`,
         and a concise comment explaining why the task left the batch.
  skill_refs:
    - orbit
    - orbit-track-issues
    - orbit-graph
  tools:
    - orbit.task.locks
    - orbit.task.show
    - orbit.task.update
    - orbit.graph.pack
    - orbit.graph.search
    - orbit.graph.show
    - orbit.graph.overview
    - orbit.graph.refs
    - fs.read
  created_by: system
