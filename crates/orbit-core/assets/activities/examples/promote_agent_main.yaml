schemaVersion: 2
kind: Activity
metadata:
  name: promote_agent_main
spec:
  type: deterministic
  description: >
    Retired Phase 4 stub. The dispatcher intentionally rejects this action
    instead of returning a skipped-success payload, because automatic
    integration-branch promotion is not a shipped Orbit behavior. Use the
    supported `git_merge`, `git_push`, and `pr_open` deterministic actions
    when modeling v2 git flow.

    Historical intent: used by the T20260418-0421 pipeline as the success-path terminal step
    after per-unit PRs have been reviewed and (optionally) merged into
    `agent-main`. Failure to meet any required-check gate is a hard error,
    not a silent no-op.
  input_schema_json:
    type: object
    required: [target_branch, source_branch]
    properties:
      target_branch:
        type: string
      source_branch:
        type: string
      required_checks:
        type: array
        items:
          type: string
  output_schema_json:
    type: object
    required: [promoted]
    properties:
      promoted:
        type: boolean
      target_sha:
        type: string
      skipped_reason:
        type: string
  action: promote_agent_main
  config:
    default_required_checks:
      - ci/build
      - ci/fmt
