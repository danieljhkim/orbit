schemaVersion: 1
kind: Activity
metadata:
  name: update_task
spec:
  spec_type: automation
  description: 'Safety net: persist task status if the task is not already at the target status. Skips silently when the task status already matches.'
  input_schema_json:
    type: object
    required:
      - task_id
    properties:
      task_id:
        type: string
        description: The Orbit task ID to mutate.
      status:
        type: string
        description: The target task status to apply using Orbit's normal transition rules. When absent, the step is a no-op (the agent already persisted status directly).
  output_schema_json:
    type: object
    properties: {}
  action: update_task
  created_by: system
