schemaVersion: 1
kind: Activity
metadata:
  name: git_push
spec:
  spec_type: automation
  description: Push worktree branch to remote.
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Job run ID for this pipeline execution.
      batch_id:
        type: string
        description: Original batch identifier to use when pushing inside a nested review or fix-loop job.
      workspace_path:
        type: string
        description: Override worktree path. Resolved from run context when omitted.
      branch:
        type: string
        description: Optional branch to push. Defaults to the branch checked out in workspace_path.
  output_schema_json:
    type: object
    properties: {}
  action: git_push
  created_by: system
