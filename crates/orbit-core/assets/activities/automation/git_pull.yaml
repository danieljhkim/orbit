schemaVersion: 1
kind: Activity
metadata:
  name: git_pull
spec:
  spec_type: automation
  description: Pull latest remote commits with rebase in worktree.
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Job run ID for this pipeline execution.
      batch_id:
        type: string
        description: Original batch identifier to use when pulling inside a nested review or fix-loop job.
      workspace_path:
        type: string
        description: Override worktree path. Resolved from run context when omitted.
  output_schema_json:
    type: object
    properties: {}
  action: git_pull
  created_by: system
