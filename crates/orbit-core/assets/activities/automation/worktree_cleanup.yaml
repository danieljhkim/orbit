schemaVersion: 1
kind: Activity
metadata:
  name: worktree_cleanup
spec:
  spec_type: automation
  description: Remove the per-run worktree, prune registrations, and delete the local branch when one is detected.
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Job run ID identifying the worktree to remove.
      workspace_path:
        type: string
        description: Override worktree path. Resolved from run context when omitted.
  output_schema_json:
    type: object
    properties:
      cleaned_up:
        type: boolean
      workspace_path:
        type: string
      branch:
        type: string
  action: worktree_cleanup
  created_by: system
