schemaVersion: 1
kind: Activity
metadata:
  name: pr_open
spec:
  spec_type: automation
  description: Commit remaining changes, push the branch, open a pull request, and update the batch tasks with PR metadata.
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: Job run ID for this pipeline execution.
      batch_id:
        type: string
        description: Original batch identifier to use when the caller has already preserved the batch context explicitly.
      base:
        type: string
        description: Target branch for the PR. Defaults to the pipeline base branch.
      workspace_path:
        type: string
        description: Override worktree path. Resolved from run context when omitted.
      completed_task_ids:
        type: array
        items:
          type: string
        description: Optional ordered task list to preserve bundle ordering in the generated PR metadata.
      title:
        type: string
        description: Optional PR title override. When omitted, Orbit derives one from the batch tasks.
      body:
        type: string
        description: Optional PR body override. When omitted, Orbit generates a task-list body for the batch.
  output_schema_json:
    type: object
    properties: {}
  action: pr_open
  created_by: system
