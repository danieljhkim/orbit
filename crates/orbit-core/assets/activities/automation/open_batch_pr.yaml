schema_version: 1
created_by: system
activity:
  id: open_batch_pr
  spec_type: automation
  description: "Push the worktree branch and open a PR for all tasks tagged with the current batch_id. Rebase onto base if needed."
  input_schema_json:
    type: object
    required:
      - run_id
    properties:
      run_id:
        type: string
        description: "Job run ID, used as batch_id to query tasks belonging to this batch."
      workspace_path:
        type: string
        description: "Path to the worktree. Required."
      base:
        type: string
        description: "Base branch to PR against. Defaults to main."
  output_schema_json:
    type: object
    properties: {}
  action: open_batch_pr
