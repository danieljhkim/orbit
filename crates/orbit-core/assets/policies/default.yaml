schemaVersion: 2
kind: Policy
metadata:
  name: default
spec:
  description: Default filesystem profile policy for Orbit activity runs
  denyRead:
    - "**/.env"
    - "**/.env.*"
    - "**/*.env"
    - "**/*.env.*"
  denyModify:
    - .orbit/**
    - "**/.env"
    - "**/.env.*"
    - "**/*.env"
    - "**/*.env.*"
  fsProfiles:
    implementer:
      read:
        - ./**
      modify:
        - ./**
    reviewer:
      read:
        - ./**
      modify: []
    pure_compute:
      read: []
      modify: []
    docs_writer:
      read:
        - ./**
      modify:
        - docs/**
        - "!docs/drafts/**"
