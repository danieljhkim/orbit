[[hooks.PreToolUse]]
matcher = '^(Bash|apply_patch|mcp__.*|mcp\..*)$'

[[hooks.PreToolUse.hooks]]
command = '"$(git rev-parse --show-toplevel)/.codex/hooks/orbit-learning-reminder"'
statusMessage = "Loading Orbit learnings"
type = "command"

[mcp_servers.orbit]
args = [
    "mcp",
    "serve",
]
command = "orbit"
enabled = true
