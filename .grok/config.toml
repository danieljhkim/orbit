[[hooks.PreToolUse]]
matcher = "Edit|Write|Read"

[[hooks.PreToolUse.hooks]]
command = ".grok/hooks/orbit-learning-reminder"
statusMessage = "Loading Orbit learnings"
type = "command"

[[hooks.PreToolUse]]
matcher = "Edit|Write"

[[hooks.PreToolUse.hooks]]
command = "scripts/orbit-file-lock"
type = "command"

[[hooks.PostToolUse]]
matcher = "Edit|Write"

[[hooks.PostToolUse.hooks]]
command = "scripts/codegraph-if-main mark-dirty"
type = "command"
async = true

[[hooks.Stop]]
matcher = ".*"

[[hooks.Stop.hooks]]
command = "scripts/codegraph-if-main sync-if-dirty"
type = "command"

[mcp_servers.orbit]
args = [
    "mcp",
    "serve",
]
command = "orbit"
enabled = true

[mcp_servers.codegraph]
args = ["serve", "--mcp"]
command = "codegraph"
enabled = true