schema_version: 4
id: T20260315-034514
title: Remove tool-side parameter aliasing from orbit builtin tools
description: |-
  `orbit.task.show`, `orbit.task.update`, and `orbit.activity.show` currently accept both `id` and `task_id`/`activity_id` as input parameter names, with the alias registered as `required: false` in the schema. This causes `run_tool_dry_run` to report `id` as a missing required parameter whenever a caller passes `task_id`, producing false positives.

  The fix is to remove aliasing from the tool layer entirely. Each tool declares one canonical param (`id`, required). Activity instructions are updated to pass `id: "{{input.task_id}}"` — the mapping from activity input name to tool param name happens at the call site, in the instruction text, not inside the tool.

  **Files to change:**
  - `orbit-tools/src/builtin/orbit/mod.rs` — `orbit_id_params`, `required_string` call-sites, alias-based tests
  - `orbit-tools/src/builtin/orbit/task_show.rs` — `required_string` accepts `["id"]` only
  - `orbit-tools/src/builtin/orbit/task_update.rs` — same
  - `orbit-tools/src/builtin/orbit/activity_show.rs` — same
  - `orbit-core/assets/activities/open_pr.yaml` — instruction step 1
  - `orbit-core/assets/activities/implement_change.yaml` — instruction steps 1, 2, 7
  - `orbit-core/assets/activities/review_pr.yaml` — instruction step 1
