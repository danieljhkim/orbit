title: Add orbit task edit command to open task in $EDITOR
description: |-
  Updating multiple task fields requires a separate CLI invocation per field (--description, --plan, --comment, etc.). For significant reworks — changing scope, rewriting the plan, adding context — this is tedious and error-prone.

  An 'orbit task edit <id>' command that opens the task in $EDITOR (like 'git commit --edit' or 'crontab -e') would enable bulk edits in a single flow.
