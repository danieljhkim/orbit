title: orbit task search does not match on task titles
description: |-
  Searching for terms that appear verbatim in task titles returns no results. Example: 'orbit task search "shorten task id"' returns nothing even though task T20260312-033700 has title 'Shorten task and job-run IDs while preserving creation order'.

  This makes task search unreliable as a duplicate-detection tool and as a workflow aid — both key uses during task creation and triage.
