title: orbit task list truncates title when terminal is narrow due to wide ID column
description: |-
  The ID column in 'orbit task list' consumes ~45 characters (e.g. T20260314-041715-1773461835307716000), leaving little room for the title on standard 80- or 120-column terminals. Titles are either truncated or cause line-wrapping that breaks the table layout.

  This is partially resolved by the ID shortening work (T20260314-053636), but column widths should also adapt to terminal width rather than using fixed padding.
