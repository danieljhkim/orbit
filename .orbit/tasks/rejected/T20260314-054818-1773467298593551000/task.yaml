title: Make execution-summary optional before in-progress -> review transition
description: |-
  Transitioning a task from in-progress to review hard-fails if execution_summary is empty:

    error: task 'T...' requires non-empty execution_summary before transitioning in-progress -> review

  The intent is good — summaries should be written — but hard-blocking the transition creates friction when an agent or human wants to park the task in review and write the summary immediately after (e.g. while still in the same CLI session).

  A warning that allows the transition to proceed would preserve the norm without blocking the workflow.
