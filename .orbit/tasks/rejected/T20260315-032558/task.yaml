schema_version: 4
id: T20260315-032558
title: Support required parameter aliases in tool schemas
description: |-
  ## Summary

  Builtin Orbit tools sometimes need to accept both a canonical parameter name and an activity-friendly alias, such as `id` and `task_id`. `ToolSchema` can only mark individual parameters as required, so there is no way to express an alias set like "one of these names is required."

  This surfaced while adding `orbit.task.show` and `orbit.activity.show`: the shipped activity YAML already uses `task_id`, but the generic tool surface naturally wants `id`. The implementation now accepts both names, but `run_tool_dry_run` still reasons about required parameters one key at a time, so schema validation and real execution can drift.
contextFiles:
- orbit-types/src/tool.rs
- orbit-core/src/runtime/pipeline.rs
- orbit-tools/src/builtin/orbit/mod.rs
