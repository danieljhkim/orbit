proposalDecisionNote: 'Dry-run is advisory not blocking so real impact is low. Plan too vague (''add a way to represent alias groups'') for a schema change spanning orbit-types, orbit-core, and orbit-tools. Better fix: remove tool-side aliasing, keep one canonical param (id), and have activity instructions map input.task_id to id explicitly. Alias logic belongs at the call site, not in ToolSchema.'
