title: Remove Orbit auto-commit support for job-created artifacts
description: |-
  # Remove Orbit auto-commit support for job-created artifacts

  **Goal:** Remove Orbit's built-in behavior that automatically stages and commits agent-created report files and run artifacts after successful job execution.

  **Requested cleanup:**
  - Delete the job runtime path that turns a successful `created_file` result into `git.stage_paths` and `git.commit` tool calls.
  - Remove or redefine the agent/job result contract so activities are no longer documented as returning files that Orbit will auto-commit.
  - Clean up tests, docs, skills, and built-in activity specs that currently assume this auto-commit workflow exists.

  **Scope:**
  - Runtime/job execution code that validates `created_file` for post-run auto-commit behavior
  - Activity and skill documentation that tells agents Orbit will auto-commit reports
  - Regression tests that currently prove report-plus-run-artifact commits happen automatically
  - Any dead helper code, constants, or error paths that only exist for the auto-commit feature

  **Out of scope:**
  - General git tool support such as explicit `git.commit` tool execution when directly requested
  - Unrelated job execution changes outside the auto-commit removal

  **Assumptions:**
  - Agents may still write report files as artifacts, but Orbit should no longer mutate git state automatically after a job run.
  - The `created_file` field is only needed today because of the auto-commit/report contract and can be removed or narrowed if no longer required elsewhere.

  **Risks:**
  - Some built-in operational workflows currently rely on auto-committed reports for auditability, so those workflows need a deliberate non-commit artifact story.
  - Removing the contract may affect existing skills, activities, and human expectations unless the docs and schemas are updated together.
