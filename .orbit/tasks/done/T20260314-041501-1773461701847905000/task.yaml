title: Reduce SQLite support to agent sessions, tools, and audit events only
description: |-
  # Reduce SQLite support to agent sessions, tools, and audit events only

  **Goal:** Remove all remaining legacy SQLite support except for the SQLite-backed stores we intentionally want to keep: `agent_session`, `tools`, and `audit_events`.

  **Requested cleanup:**
  - Keep SQLite support only for `agent_session_store`, `tool_store`, and `audit_event_store`.
  - Remove leftover SQLite support for everything else, including legacy schema/bootstrap, `memo_store`, `audit_store`, lock storage, and related glue code.
  - Clean out the dead/shared SQLite scaffolding so the remaining SQLite layer is narrowly scoped and obvious.

  **Scope:**
  - `orbit-store/src/sqlite/` modules that are outside the keep-list
  - `orbit-store/src/sqlite/migration.rs` and `orbit-store/migrations/0001_init.sql`
  - Store exports/factories/backends that still expose removed SQLite responsibilities
  - Runtime/context wiring that still assumes removed SQLite-backed services exist
  - Tests/docs that still assume the broader historical SQLite surface

  **Out of scope:**
  - Removing SQLite support for `agent_session_store`, `tool_store`, or `audit_event_store`
  - Broad persistence changes outside the legacy SQLite cleanup needed for this boundary

  **Assumptions:**
  - `audit_store` is legacy and should be removed or subsumed by `audit_event_store`, rather than preserved as a separate SQLite concern.
  - Any non-kept SQLite service that is still required at runtime (for example locking) should be replaced with the simplest non-SQLite implementation consistent with current architecture.

  **Risks:**
  - `orbit-core` still depends on SQLite-backed audit and lock abstractions today, so this refactor may require API changes and replacement implementations rather than pure deletion.
  - `Store`/`StoreTx` and `migration.rs` are shared entry points for the surviving SQLite stores; over-pruning could break the keep-list if the boundary is not redrawn carefully.
  - User-facing audit commands may still depend on `audit_store`; if so, they need a deliberate migration plan instead of silent removal.
