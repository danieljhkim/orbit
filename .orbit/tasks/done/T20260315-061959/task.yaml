# ---- content ----
title: Standardize bundled asset YAML formatting and field grouping
description: |-
  ## Summary

  Orbit's bundled YAML assets under `orbit-core/assets` currently mix formatting styles across activities, identities, and jobs. Long prose fields sometimes use folded scalars or single-line strings, field ordering varies by asset type, and the files do not consistently present a clear logical grouping.

  Standardize these bundled asset files so they read as one intentional format. In particular, long paragraph-style fields such as activity instructions or identity descriptions should use literal multi-line block style (`|`) when they span multiple lines, for example:

  ```yaml
  instruction: |
    You are reviewing a pull request for an Orbit task.
  ```

  The task should also define and apply a consistent logical field order for each asset family (`activities`, `identities`, `jobs`) so the bundled files are easy to scan and maintain.
acceptanceCriteria: []

