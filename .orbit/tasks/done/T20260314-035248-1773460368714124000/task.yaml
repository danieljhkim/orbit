title: Remove SQLite support for jobs and activities
description: |-
  # Remove SQLite support for jobs and activities

  **Goal:** Simplify Orbit persistence by removing SQLite support for job and activity storage while leaving audit-related SQLite support intact.

  **Requested change:**
  - Jobs should no longer support SQLite-backed persistence.
  - Activities should no longer support SQLite-backed persistence.
  - Audit-related persistence remains SQLite-backed.

  **Scope:**
  - Config parsing/validation that currently accepts `job.persistence.type = "sqlite"` or `activity.persistence.type = "sqlite"`
  - Runtime builder paths that construct SQLite-backed job/activity stores
  - SQLite backend exports and implementations for jobs/activities
  - SQLite schema/migration/test coverage that exists only for jobs/activities
  - Tests/docs/default config comments that still present SQLite as supported for jobs/activities

  **Out of scope:**
  - Removing SQLite support for audit or audit-event persistence
  - Changing tool, lock, or agent-session persistence in this task
  - Reworking file-backed job/activity schemas beyond what is needed to remove SQLite support

  **Assumptions:**
  - File-backed persistence is the intended long-term path for jobs and activities.
  - In-memory/runtime test setups may need to switch from SQLite-backed job/activity stores to file-backed or purpose-built test alternatives.

  **Risks:**
  - There may be hidden test/runtime coupling to SQLite-backed job/activity stores, especially in in-memory runtime construction.
  - Existing config fixtures that explicitly use SQLite for jobs or activities will need to become rejection tests or migrate to file-backed config.
