reviewDecisionNote: 'Implementation is correct and well-scoped. The step_output_for_following_input helper cleanly dispatches on spec_type: agent_invoke steps extract envelope.result, all other types merge response_json directly. Regression test covers the exact failure scenario (agent returns task_id inside envelope, next CLI step requires it at top level). Full workspace green. One minor note: the catch-all arm _ defaults to flat merge, which is a safe and reasonable default for future spec_types.'

