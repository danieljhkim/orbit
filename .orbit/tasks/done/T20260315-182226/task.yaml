# ---- content ----
title: 'Fix: job pipeline merges full agent envelope instead of result into next step input'
description: |-
  After an agent step succeeds, the job pipeline merges `outcome.response_json` into `current_input`. For agent steps, `response_json` is the serialized `AgentResponseEnvelope` (`{schemaVersion, status, durationMs, error, result: {...}}`), not just the inner result payload. This means output fields like `task_id` are nested under `result` instead of being promoted to the top level, so subsequent steps that require those fields will always fail input validation.

  **Observed failure:** `job_task_pipeline` run `jrun-20260315-180957` — `dispatch_task` succeeded and returned `{result: {task_id: "T...", comment: "..."}}` but `create_branch` reported both `task_id` and `base` as missing required properties.
acceptanceCriteria: []

