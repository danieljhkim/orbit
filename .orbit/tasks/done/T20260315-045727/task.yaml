title: Consolidate default identities to four canonical personas end-to-end
description: |-
  ## Summary

  Replacement for rejected task `T20260315-044737`. The original consolidation goal is still valid, but the work must cover all runtime surfaces that currently assume the six-default identity set.

  Target default identity set:
  - `linus` with role `engineer`
  - `lamport` with role `architect`
  - `prii` with role `reviewer`
  - `steve` with role `ceo` (unchanged)

  This task must update the full identity pipeline, not just the asset YAMLs:
  - `IdentityRole` must support any new roles introduced by the replacement identities
  - seeded defaults in `seed_default_identities` must switch from the current six names to the new four
  - tracked repo-local `.orbit/identities/*.yaml` copies must stay in sync with `orbit-core/assets/identities/*.yaml`
  - active built-in activities that still reference retired identities (currently `kent`) must be repointed
  - init / identity tests that assert the old default file set must be updated

  ## Explicit Non-Goals

  - Do not rewrite historical task bundles just because they mention retired identity names
  - Do not rename activity IDs like `approve-task-leader` unless there is a separate task for that
  - Do not keep the contradictory `planner` role from the rejected task; `steve` remains `ceo`

  ## Why this task exists

  Review of `T20260315-044737` found three blockers that must be designed in from the start:
  1. `architect` and `reviewer` are not valid `IdentityRole` values today
  2. `resolve-backlogged-task` still references `kent`
  3. `seed_default_identities` would recreate the retired identities on `orbit init` unless updated
