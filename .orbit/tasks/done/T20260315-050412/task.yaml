# ---- content ----
title: Resolve drift between bundled activity assets and tracked .orbit active copies
description: |-
  ## Summary

  While executing `T20260315-045727`, I confirmed that tracked `.orbit/activities/active/*.yaml` files are not just materialized copies of `orbit-core/assets/activities/*.yaml`; some of them have drifted into meaningfully different specs.

  Examples observed:
  - `resolve-backlogged-task` is `agent_invoke` in the bundled asset but `task` in the tracked active copy
  - `approve-task-leader` is `agent_invoke` in the bundled asset but `task_approval` in the tracked active copy
  - the tracked active copies also carry extra timestamps and formatting differences

  This leaves Orbit with two checked-in sources of truth for built-in activities, and small maintenance edits can silently update only one side.
