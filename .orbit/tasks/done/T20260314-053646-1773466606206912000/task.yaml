title: 'cargo test -p orbit-cli fails: package named ''orbit'' not ''orbit-cli'''
description: |-
  The CLI binary crate lives in the 'orbit-cli/' directory but its Cargo package name is 'orbit'. Running the expected command:

    cargo test -p orbit-cli

  fails with:

    error: package ID specification `orbit-cli` did not match any packages
    help: a package with a similar name exists: `orbit-core`

  The correct incantation is 'cargo test -p orbit', which is non-obvious. This is a developer experience issue that causes confusion when navigating the 8-crate workspace — especially since every other crate's directory name matches its package name (orbit-core, orbit-store, orbit-types, etc.).
