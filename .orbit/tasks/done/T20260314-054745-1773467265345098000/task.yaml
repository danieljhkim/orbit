title: Add --title flag to orbit task update
description: |-
  Tasks cannot be renamed after creation. 'orbit task update' has no --title flag, so if the scope or framing of a task changes, the only recourse is leaving a comment explaining the intended title or creating a new task.

  Title is just as mutable a field as description or plan — there is no reason to treat it as immutable.
