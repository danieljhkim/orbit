id: T20260315-004224
title: Clarify source of {{workspace_path}} for activity template rendering
description: |-
  Activity execution task T20260315-002659 introduces a `{{workspace_path}}` template namespace for activity specs, but the current Orbit activity model and execution context do not store a workspace path for activities or job steps.

  This forces implementers to guess whether the value should come from the Orbit data root, git repo root, task workspace, job metadata, or a new activity field. That ambiguity makes the template behavior fragile and difficult for future agents to reason about.
