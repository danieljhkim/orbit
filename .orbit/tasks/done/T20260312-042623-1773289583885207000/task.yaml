title: Fix approve-task-leader job failure when identity prii cannot be resolved
description: |-
  # Defect: approve-task-leader fails with missing identity

  The job run below failed immediately during agent invocation because Orbit could not resolve the configured identity `prii`:

  - job_id: `job-approve-task-leader`
  - run_id: `jrun-1773289488943420000`
  - state: `failed`
  - attempt: `1`
  - error_code: `AGENT_INVOCATION_FAILED`
  - error_message: `identity not found: prii`

  Observed impact:
  - the `approve-task-leader` automation cannot execute its task-approval workflow
  - proposal/review approvals that depend on this job are blocked until identity resolution is restored

  Known context:
  - the active activity spec for `approve-task-leader` is configured with `identityId: prii`
  - `.orbit/identities/prii.yaml` exists in the repo
  - Orbit failed to resolve that identity at runtime anyway, which suggests a mismatch between the configured identity root and the repo-local identity files, or a bootstrap/root-selection issue

  Scope:
  - diagnose why runtime identity resolution cannot find `prii` for `approve-task-leader`
  - restore successful execution of the approval job without weakening identity validation
  - add regression coverage so this failure mode is caught automatically

  Out of scope:
  - redesigning the identity system broadly
  - changing the approval workflow semantics beyond what is needed to restore correct execution

  Risks:
  - this may be coupled to recent or in-progress root-selection changes around repo-local `.orbit`
  - fixing only the activity data or only the runtime path resolution may leave similar jobs broken elsewhere
contextFiles:
