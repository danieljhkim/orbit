title: Remove ANTHROPIC_API_KEY from Claude agent required env vars
description: Claude authenticates via browser OAuth credentials stored in `~/.claude/` (home-relative). Requiring `ANTHROPIC_API_KEY` in the hermetic env passthrough is wrong — it forces API-key auth and blocks subscription-based users. `HOME` is already passed through, which is sufficient for Claude Code to find its stored credentials.
