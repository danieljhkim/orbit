id: T20260314-053625-1773466585770648000
title: 'Job YAML files written with state field at top level instead of under job: key'
description: |-
  The serde_yaml serializer for the Job struct was writing the 'state' field (and previously 'next_run_at', 'created_at', 'updated_at', 'env_extra') at the top-level YAML document instead of nested under the 'job:' mapping.

  This produced structurally malformed YAML files like:

  ```yaml
  schemaVersion: 1
  job:
    job_id: job-resolve-backlogged-task
    ...
    timeout_seconds: 1200
  state: enabled          # ← wrong level: top-level, not under job:
    next_run_at: ...      # ← indented under scalar — invalid YAML
    created_at: ...
  ```

  serde_yaml silently accepted these files on read (because 'deny_unknown_fields' is not set), but writing back files in the same format caused parse errors. The bug was discovered during the scheduler removal task (T20260314-041715) when re-reading these corrupted files.

  All five live job YAML files in .orbit/jobs/jobs/ were affected. They were manually corrected during the task, but any jobs persisted before the fix may have the same corruption.
