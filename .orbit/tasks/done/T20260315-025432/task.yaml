id: T20260315-025432
title: 'feat: add orbit.task.* and orbit.activity.show builtin tools'
description: |-
  ## Summary

  Agents currently have no structured way to read or update Orbit task data during activity execution. The `open_pr.yaml` activity needs `orbit.task.show` to fetch a task's title and description, and other activities will need similar access as the activity library grows.

  This task adds a new `orbit` tool namespace to the builtin tool registry, initially covering the most agent-useful task and activity commands:

  - `orbit.task.show` — fetch a single task by ID
  - `orbit.task.list` — list tasks, optionally filtered by status
  - `orbit.task.update` — update task fields (status, execution summary, comments)
  - `orbit.activity.show` — fetch a single activity by ID

  ## Constraint

  `orbit-tools` must not depend on `orbit-core` (circular dependency: `orbit-core` → `orbit-tools`). All tools invoke the `orbit` binary via `run_process`, the same pattern used by all `github.*` tools with `gh`.

  ## Out of Scope

  - `orbit.job.*`, `orbit.audit.*`, `orbit.identity.*` (add in a follow-up if needed)
  - Architectural changes to `ToolContext` (trait injection approach is a separate refactor)
