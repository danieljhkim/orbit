# ---- content ----
title: Refresh all bundled activities and jobs during orbit init
description: |-
  ## Summary

  `orbit init` should initialize the full current set of bundled default artifacts, not a partial or stale subset. Today Orbit ships 10 bundled activities and 4 bundled jobs under `orbit-core/assets`, but the init path only seeds 4 activities and treats activities/jobs as create-only, so newly added defaults and bundled updates do not reliably land in initialized workspaces.

  Bring `orbit init` in line with the bundled assets directory so explicit init refreshes all current default activities and jobs the same way it already refreshes default identities and skills.
acceptanceCriteria: []

