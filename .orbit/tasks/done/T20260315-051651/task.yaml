title: Fix stale hardcoded path in user-level orbit-execute-change-request skill
description: |-
  The user-level skill at `~/.claude/skills/orbit-execute-change-request/SKILL.md` contains a hardcoded absolute path `/Users/daniel/.orbit/tasks/...` which is the old data root. The canonical asset (`orbit-core/assets/skills/orbit-execute-change-request/SKILL.md`) correctly uses `{{ORBIT_ROOT}}`, but the deployed user-level copy was never updated when the data root moved to the repo-local `.orbit/`.

  This causes agents to write execution summaries to the wrong location on every execution, requiring manual correction each time.

  A secondary issue: the skill instructs agents to write the file directly, but `orbit task update --execution-summary` already resolves the correct path — agents should prefer that over file writes.
acceptanceCriteria: []

