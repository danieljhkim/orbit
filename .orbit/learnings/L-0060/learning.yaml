summary: Keep named resource execution trust-separated from workspace-preferred display catalogs
body: 'ORB-00356 fixed a security issue where name-based job/activity execution reused catalog precedence that allowed workspace-local `.orbit/resources/**` assets to shadow shipped defaults. Future changes that add named executable resources should keep display/listing override semantics separate from execution resolution: explicit env/test roots may opt in, shipped global defaults stay authoritative, and workspace-local assets must not claim shipped names without an explicit persisted trust model.'
