summary: Use inline Rust `mod` fixtures when orbit-graph tests need module-qualified symbols
body: 'During ORB-00311, Pass 2 tests initially assumed separate Rust files like `src/imported.rs` would produce file-module-qualified symbols such as `imported::target`. The current Rust extractor is pure per-file tree-sitter extraction: it starts each file at `ModuleScope::root()` and only emits module prefixes that appear in the file content itself. Cross-file resolver tests that need qualified module prefixes should either define inline `mod ... {}` blocks in the fixture source or seed the graph rows directly. Do not infer module hierarchy from file paths in pass2 tests unless the Rust extractor has been intentionally changed to do that.'
