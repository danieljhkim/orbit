summary: 'Procedure for adding a new Orbit hook subcommand: core module owns payload parsing, state-file lock, watermark merge, audit emission, render bodies. CLI file (â‰¤50 lines) owns clap struct, Execute impl, and one call into core. See L-0040 for the underlying layering rule.'
body: |
  **Procedure for adding or extending an Orbit hook subcommand (PreToolUse / PostToolUse / SessionStart / etc.).** Background rule: see L-0040 â€” orbit-cli is a thin clap wrapper; this procedure operationalizes it for hooks.

  **1. Core module first.** Under `orbit_core::command::<name>_hook/` â€” mirror [`learning_hook`](crates/orbit-core/src/command/learning_hook/). Owns:

  - Payload parsing (`parse_payload_with_tools`-style: stdin shape, accepted tool names, target-path classification)
  - Search / admission logic (relevance gate; per-call caps from env via `caps_from_env`)
  - State-file path resolution (`<hook>_hook_state_file_path` keyed on session id + parent pid)
  - Watermark state (`merge_state`, `parse_state_json`, locked update via `fs2::FileExt`)
  - Audit-event params construction (mirror `emit_learning_injected_audit`)
  - Render bodies for each `HookOutputFormat` variant (Claude / Codex / Gemini / Grok)

  **2. CLI subcommand file.** Under `crates/orbit-cli/src/command/hook/<name>.rs`, â‰¤50 lines. Shape:

  ```rust
  #[derive(Args)]
  pub struct <Name>Args {
      #[arg(long, value_enum, default_value_t = HookOutputFormat::Claude)]
      pub format: HookOutputFormat,
  }

  impl Execute for <Name>Args {
      fn execute(self, runtime: &OrbitRuntime) -> Result<(), OrbitError> {
          if let Err(error) = orbit_core::command::<name>_hook::run(runtime, self.format.into()) {
              tracing::warn!(error = %redact_sensitive_env_text(&error), "<name> hook failed open");
          }
          Ok(())
      }
  }
  ```

  The CLI reads stdin and calls into core; core returns the rendered string (or None); CLI prints it. Nothing else.

  **3. Wire up dispatch.** Add the subcommand variant to [`HookSubcommand`](crates/orbit-cli/src/command/hook/command.rs). If auto-installable, extend the shim generator in [`install.rs`](crates/orbit-cli/src/command/hook/install.rs) â€” which itself calls `orbit_core::command::hook_install` per L-0040.

  **4. Per-agent rendering.** The `HookOutputFormat` clap enum stays in `crates/orbit-cli/src/command/hook/render.rs` with an `Into<orbit_core::HookFormat>` conversion. The render *bodies* live in core. Each format must emit its native hook channel:

  - **Claude / Grok:** stdout plaintext, surfaced as a system-reminder.
  - **Codex:** JSON `hookSpecificOutput.additionalContext` â€” plaintext stdout is ignored (see L-0017).
  - **Gemini:** see `render_gemini` in `learning_hook` for the JSON contract.

  **5. State-file dedup.** Use the existing pattern from `learning_hook`:

  - File path keyed on `(session_id, parent_pid)` under a hook-shared tmpdir.
  - Inside the file, watermark per `(entity_id, last_seen_seq)` so new activity re-surfaces.
  - Lock via `try_lock_exclusive` (`fs2::FileExt`) with the 50ms retry budget; if the lock cannot be acquired, fail open.

  **6. Audit emission.** Emit a `<HookName>InjectedAudit` event on every surfaced reminder, including tool name, target path, session id, surfaced entity ids, and elapsed time. Verify via `orbit audit list --json` per L-0009.

  **7. Tests.** Sibling `tests/` under `orbit-core/src/command/<name>_hook/tests/` covering: payload parsing edge cases, lock contention, watermark advance, per-agent render output, no-result short-circuit. CLI sibling tests cover only clap â†’ core wiring (smoke).

  **8. Fail open.** Hooks must `tracing::warn!` and return `Ok(())` on internal errors â€” a flaky hook must not block tool calls. Mirror the `if let Err(error) = run_pretooluse(...)` pattern at the CLI entry point.

  **9. Trust framing.** Output must ride the hook channel each agent already trusts (per step 4), not be embedded in tool-result data. Embedding hook content in tool-result JSON is a prompt-injection vector via any file the agent reads â€” reject in review.

  **Anti-patterns (reject in review).**

  - `fs2::FileExt`, `AuditEventInsertParams`, or workspace state-file paths imported in `crates/orbit-cli/` â€” these are core's responsibility.
  - A CLI hook file past ~50 lines â€” anything beyond clap + dispatch belongs in core.
  - Network I/O from the hook â€” PreToolUse fires every tool call; must be local-only.
  - Hook content embedded in tool-result content â€” see step 9.

  **Pre-`make ci-fast` self-check.** Run `rg 'fs2|AuditEventInsertParams|update_state_file|emit_.*_audit' crates/orbit-cli/src/command/hook` â€” should return empty.

  Related: [ORB-00273](.orbit/tasks/ORB-00273/) (review-thread async steering hook â€” first user of this procedure), [ORB-00275](.orbit/tasks/ORB-00275/) (the orbit-cli â†’ orbit-core migration that codified the layering).
