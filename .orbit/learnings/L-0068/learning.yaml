summary: In a managed agent run, inherited identity env makes Orbit tests that assert default human/system actor or audit-role defaults resolve to the current agent and fail. Unset ORBIT_AGENT_*/ORBIT_MANAGED_RUN_CONTEXT/ORBIT_RUN_ID before such tests — env leakage, not a regression.
body: |-
  Some Orbit tests intentionally assert the default actor path (`human`/`system`) or the default audit role. When those run inside an agent-managed activity, inherited `ORBIT_AGENT_NAME` / `ORBIT_AGENT_MODEL` (and `ORBIT_MANAGED_RUN_CONTEXT` / `ORBIT_RUN_ID`) make `ActorIdentity::from_env()` resolve to the current agent (e.g. `gpt-5.5`), so assertions fail with the wrong label. For focused local validation — or running the full gate (`make ci`) from inside a managed run — strip the managed identity env first:

  ```
  env -u ORBIT_AGENT_NAME -u ORBIT_AGENT_MODEL -u ORBIT_MANAGED_RUN_CONTEXT -u ORBIT_RUN_ID cargo test ...
  ```

  Interpret such failures as environment leakage, not a behavior regression.

  Consolidates the duplicate guidance previously in L-0003 (ORB-00091) and L-0063 (ORB-00377).
