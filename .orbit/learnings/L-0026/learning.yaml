summary: Use unique query tokens in OrbitRuntime::in_memory docs-search tests
body: OrbitRuntime::in_memory uses a temporary workspace root whose repo root can resolve to the shared temp parent. Search tests that write docs under docs/ can leak into sibling in-memory runtimes during the same test process. Use per-test unique query/path prefixes instead of generic terms like needle when asserting search distribution.
