summary: When changing ship PR merge, pass per-task attribution (`implemented_by -> created_by -> system`) into `TaskAutomationUpdate.model`
body: The `merge_batch_pr` Done-transition loop runs as system automation, so runtime actor context is not a reliable implementer source. Resolve attribution from each task before the update (`implemented_by`, then `created_by`, then no model so actor-less flows remain `system`) and keep regression coverage for mixed-family batches.
