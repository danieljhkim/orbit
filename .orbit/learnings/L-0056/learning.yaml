summary: Clear or defer cross-file command handler FKs before refreshing orbit-graph symbols
body: When `commands.handler_symbol` points at a symbol in another file, a full or incremental refresh of the handler file deletes and reinserts that symbol. SQLite will reject the file delete unless command rows are cleared first. In pass1, null out command handler FKs that point at symbols from the file being refreshed before deleting the file's symbol rows, then let command extraction/reinsertion restore resolvable handlers when the command definition file is processed.
