summary: Use a sidecar file for orbit-graph fs2 sync locks; locking the SQLite DB file blocks SQLite reads on macOS
body: During ORB-00309, holding an fs2 exclusive lock directly on the SQLite DB path caused rusqlite reads against that DB to fail with `database is locked` on macOS. The scanner uses a DB-path-derived sidecar lock file instead, then opens SQLite normally while the RAII guard is held. Preserve that ordering for future sync work unless the storage strategy changes.
