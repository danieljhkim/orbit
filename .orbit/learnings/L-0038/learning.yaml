summary: Verify exact top-level CLI commands when preserving MCP-hidden human surfaces
body: |
  When moving a tool out of the MCP catalog, do not treat `orbit tool list` as proof that a first-class human CLI command exists. The tool registry can expose operations through `orbit tool run/show` while an acceptance-smoke command like `orbit friction list --help` is still absent.

  Run the exact CLI smoke commands named by the task before handoff. If satisfying the smoke requires adding a top-level command, wire the command enum/help, JSON error preference, audit metadata, and command parse tests in the same change.
