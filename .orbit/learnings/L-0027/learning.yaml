summary: Update the dependency-direction guard whenever an internal crate dependency edge changes.
body: 'When a task adds or removes a direct `orbit-*` dependency in a crate manifest, keep three surfaces aligned in the same change: the consuming crate''s `Cargo.toml`, `ARCHITECTURE.md` dependency diagram/prose, and `scripts/check-dependency-direction.sh`. `make ci-fast` runs the guard script and will reject a manifest-only edge change even when the Rust code compiles.'
