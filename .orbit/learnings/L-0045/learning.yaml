summary: Path::new(".env").extension() (and similar dotfiles) returns None per std::path rules; config/lang detectors must also inspect file_name() or stem for hidden files like .env, .gitignore etc.
body: |-
  During ORB-00305 port of config extractor, detect_kind using only path.extension() silently fell back to "serde" for Path::new(".env"), causing env keys to be mis-typed and tests to fail (debugged via recompiles + assert dumps). Root cause: Rust std::path::Path treats names starting with '.' as having no extension (the whole name is the stem). Fix: check file_name() fallback for exact ".env" or "*.env".

  Recurring gotcha for any extension-based file classifier (loaders, syntax highlighters, graph extractors). Evidence: task ORB-00305, L-0015 (worktree root notes).
