summary: Set an explicit workspace when MCP graph-wrapper tests invoke orbit.graph.* tools
body: The in-process `orbit.graph.*` MCP wrappers resolve their worktree from `ToolSessionContext::workspace` (or a `workspace_path`/`workspace` override) and fall back to the test process current directory when no workspace is set. Unit tests that invoke these tools without setting a temp worktree can create `.orbit/graph/*.db` under the crate directory and accidentally exercise the real checkout instead of the fixture. In orbit-mcp tests, call `server.replace_session_context(ToolSessionContext::with_workspace(tempdir.path()))` or pass `workspace_path` before invoking graph tools.
