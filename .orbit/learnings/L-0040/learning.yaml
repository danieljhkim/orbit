summary: orbit-cli is a clap-based entry point â€” domain logic lives in orbit-core. CLI subcommand files hold only Args/Subcommand structs, Execute impls, one call into orbit-core, and an optional println! to stdout. Anything else belongs in orbit-core.
body: |
  **Rule.** `orbit-cli` is a clap-based CLI entry point and nothing more. All domain logic â€” structured-payload parsing, state management, validation, audit emission, business rules, rendering bodies â€” lives in `orbit-core`. A CLI subcommand file contains only:

  - The clap `Args` / `Subcommand` struct
  - An `Execute` impl
  - One call into an `orbit_core::command::*` helper or `OrbitRuntime` method
  - Optional `println!` to stdout (the documented lint exception per [CLAUDE.md](CLAUDE.md))

  **Why.** [ARCHITECTURE.md](ARCHITECTURE.md) Â§Crates defines `orbit-cli` as "clap-based CLI entry point" and `orbit-core` as owner of "thin command facades for graph, policy, tool, store, engine, and search features." Mixing them:

  - Blocks reuse by `orbit-mcp`, `orbit-engine`, and `orbit-dashboard`, which all consume `orbit-core` but not `orbit-cli`.
  - Couples UX changes (flag renames, new subcommands) to logic changes (state, audits, validation) â€” PR diffs become noisy and reverts get risky.
  - Forces tests to stand up clap and stdin/stdout instead of calling a typed function.

  Precedents in this slimming arc: `orbit-dashboard` was extracted from `orbit-cli` in ORB-00146; hook domain logic was re-homed into `orbit-core` in ORB-00275.

  **How to apply.**

  When writing or extending an `orbit-cli` subcommand, ask:

  - Does this need clap parsing, stdin, or stdout? â†’ CLI.
  - Otherwise â†’ `orbit-core`.

  A subcommand file that exceeds ~80 lines and is not pure dispatch is the smell. Move the body to `orbit_core::command::<feature>`, expose a typed entry point on `OrbitRuntime` or a free function taking `&OrbitRuntime`, and call it from the `Execute` impl. Tests follow the move â€” sibling `tests/` lives next to the moved code in `orbit-core`, not in `orbit-cli` (per [docs/design-patterns/test_layout.md](docs/design-patterns/test_layout.md)).

  For the hook subsystem specifically, follow the implementation procedure in the companion learning (tag `procedure` + `hooks`).

  **Self-check.** After your change, if any file under `crates/orbit-cli/src/command/<your_feature>/` exceeds ~80 LOC and is not pure clap + dispatch, the domain logic is in the wrong crate.
