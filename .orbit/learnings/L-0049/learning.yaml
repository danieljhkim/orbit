summary: Silence the panic hook when caught Rust panics are an expected skip path
body: Rust's `catch_unwind` catches the panic after the global panic hook has already run. If a sync/extraction path intentionally catches per-file panics and turns them into structured `tracing::warn` skip events, install a temporary silent panic hook around that narrow extraction window and restore the previous hook afterward. Guard hook mutation with a mutex because the hook is process-global; otherwise tests or other concurrent syncs can race the hook or still print scary panic messages despite a successful catch.
