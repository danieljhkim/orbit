summary: Keep legacy host orbit.graph.* schemas visible while orbit-knowledge owns the graph surface
body: After ORB-00344 rolled back the orbit-graph cutover, the runtime host once again owns the active legacy orbit.graph.* tools. Do not filter every host graph schema before appending adapter-owned orbit-graph wrappers in this state; that shadows restored legacy tools such as pack, callers, deps, overview, and implementors and re-exposes cutover-only wrappers. Future cutover work can replace this guidance only when the adapter and runtime registered graph surfaces are intentionally equivalent.
