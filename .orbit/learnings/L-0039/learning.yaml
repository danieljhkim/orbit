summary: Orbit hook domain logic (state-file locking, watermark merge, audit emission, render bodies, install/uninstall policy) lives in orbit-core, not orbit-cli. The CLI hook directory holds only clap structs, Execute impls, and subcommand dispatch.
body: |
  **Rule.** Domain logic for Orbit hooks lives in `orbit-core`, not `orbit-cli`. The CLI hook directory holds clap `Args` structs, `Execute` impls, and subcommand dispatch — nothing else. State-file locking, payload parsing, watermark merge, audit emission, per-agent rendering bodies, and hook-config install/uninstall policy all live under `orbit_core::command::<hook_name>`.

  **Why.** [ARCHITECTURE.md](ARCHITECTURE.md) defines `orbit-cli` as "clap-based CLI entry point" and `orbit-core` as owner of "thin command facades" for graph/policy/tool/store/engine/search features (§Crates). Domain creeping into CLI breaks testability for other crates (engine, MCP adapters), makes future MCP exposure painful, and ties UX changes to logic changes. The precedent is `orbit-dashboard`, extracted from `orbit-cli` in ORB-00146 for the same reason. The hook directory accreted ~900 lines of domain before this rule was written down — see [[hook-domain-migration]] / ORB-00275 for the cleanup arc.

  **How to apply.**

  - **New hook subcommand.** Land logic in a new `orbit_core::command::<hook_name>` module (mirror `orbit_core::command::learning_hook`). The CLI file should be ≤~50 lines.
  - **Extending an existing hook.** If the helper you reach for is not already in `orbit_core::command::learning_hook` (or its siblings), that is a smell — add it there before calling from CLI. Do not grow the CLI file.
  - **Render bodies.** Per-agent format dispatch bodies (`render_claude` / `render_codex` / `render_gemini` / `render_json_context`) live in core. The `HookOutputFormat` clap enum stays in CLI with an `Into<…>` conversion to a core-facing type.
  - **State files, locks, audit emission.** Always core. CLI must not touch `fs2::FileExt`, `AuditEventInsertParams`, or workspace state-file paths in hook flows.
  - **`println!` for hook stdout** is the documented exception per [CLAUDE.md](CLAUDE.md) — it stays in CLI (which actually emits stdout). The core helper returns a `String`; CLI prints it. This keeps the lint exception narrow.

  **Pre-`make ci-fast` self-check.** Run `rg 'fs2|AuditEventInsertParams|update_state_file|emit_.*_audit' crates/orbit-cli/src/command/hook` — should return empty after this rule applies.
