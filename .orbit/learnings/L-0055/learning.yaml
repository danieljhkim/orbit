summary: Bypass orbit-graph coalescing when testing flock races with same-process threads
body: |-
  `Graph::sync` coalesces concurrent calls inside one process by the literal DB path key before the sync body runs. A same-process regression test that opens two handles with the same worktree path may only exercise the coalescing mutex, not the cross-process flock.

  For flock race tests that need deterministic interleaving without spawning a second binary, open one `Graph` through the real worktree path and another through a symlink to the same worktree. The coalescing keys differ, but the sidecar lock resolves to the same physical file, so the test exercises the flock serialization path. Coordinate the first sync after scan to reproduce stale-diff races.
