summary: Preserve orbit-knowledge bridge shims for legacy extraction leaves until its query surface intentionally migrates
body: |-
  During ORB-00306, delegating `orbit-knowledge::extract` directly to `orbit-graph-extract` failed existing orbit-knowledge behavior in a few places because the graph-extract ports intentionally emit the raw graph model, while orbit-knowledge still exposes legacy `ExtractionResult` leaves and spans. The bridge currently preserves legacy-only C `#define` macro leaves, Kotlin package/object/companion compatibility, Ruby `attr_*` synthetic methods, and Markdown heading section extents.

  Do not delete those bridge shims merely because `orbit-graph-extract` does not emit identical rows. Remove or alter them only when the downstream orbit-knowledge query surface has been intentionally migrated, accepted, or retired.
evidence:
- kind: task
