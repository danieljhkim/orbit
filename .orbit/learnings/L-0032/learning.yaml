summary: Avoid placing Rust test module files under directories named build because the repo-wide build/ ignore rule hides them
body: 'The workspace .gitignore has a broad build/ rule, so a path such as crates/orbit-knowledge/src/pipeline/build/tests/mod.rs is ignored even though it sits under src/. If a Rust module named build.rs needs test scaffolding, keep tiny tests inline or put the test module at a non-ignored path and use #[path = ...]. Check git status --ignored when a newly created test module does not appear in the diff.'
