summary: Keep release checksum signing trust aligned across CLI, npm, and semantic companion installers
body: 'When release assets or checksum signing change, verify every consumer of orbit-checksums.txt.sig trusts the same active release signing key: install.sh, plugin/npm/scripts/install-binary.js, and crates/orbit-search/src/commands/install.rs. A release workflow can sign and upload a valid combined manifest while orbit semantic install still fails if its baked-in key drifts. Keep scripts/check-installer-pubkey.sh covering all three surfaces before relying on release smoke results.'
