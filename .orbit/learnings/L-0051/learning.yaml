summary: Scope orbit-graph sync test hooks to a specific DB path because tests run in parallel
body: Process-global test hooks in orbit-graph can be consumed by unrelated tests because Rust unit tests run in parallel by default. When adding sync failure gates, leader gates, counters, or similar instrumentation, key one-shot behavior by the graph DB path or worktree path so the intended temp-dir test is the only consumer.
