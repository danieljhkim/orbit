summary: process_identity dead-pid tests must tolerate both NoProcess and Unavailable from probe on invalid PIDs (ps(1) error semantics differ across Linux/macOS)
body: "The unit test `dead_pid_yields_no_process_probe_outcome` (now in `utility/process_identity/tests/identity.rs`) hard-asserted `ProbeOutcome::NoProcess` for `u32::MAX-1`. On macOS the `ps -p <huge>` path in `lstart_raw`/`probe_process_start_identity` returns `Err(_)` (spawn/output failure) → `Unavailable`; on some Linux it yields `Ok(None)` → `NoProcess`. \n\nRoot cause: test encoded one platform's `ps` CLI behavior as the only valid terminal outcome. The `ProbeOutcome` enum exists precisely to distinguish these cases for callers.\n\nFix: changed assert to `matches!(NoProcess | Unavailable)` with explanatory comment. Future tests around `ps` wrappers or liveness probes should use the full enum or `process_start_identity_token` (which collapses both to None).\n\nApplies to: any unix process-liveness test, CI on heterogeneous runners, and the process_identity module under `utility/`."
