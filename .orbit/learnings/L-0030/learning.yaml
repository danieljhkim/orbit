summary: Preserve explicit task context_files replacements, including future paths; reserve pruning for read-time safety or explicit prune flows
body: 'When `TaskUpdateParams.context_files` is set, treat it as the caller-owned replacement list after selector normalization. Do not run `prune_missing_context_files` on that explicit update path: tasks may intentionally name files that are about to be created, and dropping them silently recreates the direct-YAML-edit failure mode. Keep pruning on read-time canonicalization/backfill paths where the caller did not ask to replace the list.'
