summary: When extracting TypeScript generics, handle `generic_type` without a `type` field by reading the first reference from node text
body: While implementing ORB-00302, `tree-sitter-typescript` exposed `Promise<T>` as a `generic_type` node whose base identifier was not available through `child_by_field_name("type")` in the observed parse shape. The extractor should keep the structured path first, but include a fallback that reads the first reference-like identifier from the generic node text so base types such as `Promise` still land in `RawRef` rows. Pair this with parameter/type-parameter name skipping, because widening type-context collection to include `identifier` can otherwise turn parameter names like `value` into type refs.
