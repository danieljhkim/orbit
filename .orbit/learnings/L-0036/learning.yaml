summary: Do not execute existing semantic companions to decide install freshness; verify a sidecar checksum manifest first.
body: When hardening `orbit semantic install`, treat an already-installed native companion as untrusted until local integrity metadata matches. A version probe such as `companion --version-info` is itself native-code execution, so freshness checks should read a sidecar manifest and hash the file before any replacement decision or model-download execution.
