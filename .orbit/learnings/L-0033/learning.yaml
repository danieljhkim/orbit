summary: Preserve raw-string indentation when folding nested Rust tests into sibling tests files
body: |
  When collapsing nested per-source Rust tests into a sibling `tests/<source>.rs` file, preserve the original column-0 contents of moved test bodies. Wrapping old concern files in `mod <concern> { ... }` is fine, but do not bulk-indent the included body: multiline raw string fixtures (especially YAML) include that indentation and can fail parsing. If the source module is file-rooted (for example `types/response.rs` with children under `types/response/`), the anti-pattern check may also reject `<file>/tests`; move the tests to the file-rooted parent instead and expose only the narrow test seam needed.
