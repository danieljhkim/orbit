summary: macOS SBPL (sandbox-exec) glob regexes must fold case via per-letter character classes ([Aa]), NEVER the (?i) inline flag — sandbox-exec rejects (?i) and fails the whole profile (exit 65)
body: |
  Filesystem policy glob compilation must match the platform's case-insensitive filesystem resolution (macOS/Windows) so case variants like `Secret.ENV` or `.Orbit` cannot evade deny rules (originally ORB-00366). There are TWO emission paths and they need DIFFERENT mechanisms:

  - Shared policy globs (`crates/orbit-common/src/utility/glob.rs`) compile with Rust's `regex` crate: use `RegexBuilder::case_insensitive(true)`.
  - SBPL filters for macOS `sandbox-exec` (`crates/orbit-exec/src/macos_sandbox/sbpl_filter.rs`): DO NOT use the Perl `(?i)` inline flag. `sandbox-exec`'s regex engine does not support it — it parses `(?i)` and then rejects the following `^` anchor with `sandbox-exec: unexpected ^ operator in middle of expression`, failing the entire profile with exit 65 (EX_DATAERR) before the agent CLI starts. ORB-00366 introduced `(?i)` here and broke every sandboxed macOS CLI run; ORB-00372 fixed it by folding ASCII letters into per-letter character classes (`a` -> `[Aa]`) instead.

  Guard: SBPL emission must be verified by feeding the compiled profile to real `/usr/bin/sandbox-exec`, not just by validating the regex string with the Rust `regex` crate (which accepts `(?i)` and hides the incompatibility). Those macOS-gated tests are `#[cfg(target_os = "macos")]` and skipped on the Linux merge gate, so also keep a cross-platform unit assertion that the emitted SBPL contains no `(?i)`.
