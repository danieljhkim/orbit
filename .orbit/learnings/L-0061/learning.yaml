summary: Keep filesystem policy glob regexes aligned with platform case semantics on macOS and Windows
body: 'ORB-00366 fixed a deny bypass where policy glob regexes and SBPL regex filters were case-sensitive while macOS/Windows filesystem resolution is case-insensitive by default. Future changes to path-policy glob compilation or macOS sandbox regex emission should preserve the platform case model: shared policy globs use `RegexBuilder::case_insensitive(true)` on macOS/Windows, and SBPL glob regexes include an inline case-insensitive flag so case variants such as `Secret.ENV` or `.Orbit` cannot evade deny rules.'
