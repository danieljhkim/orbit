summary: Run-scoped Orbit builtins must derive active run paths from trusted host scope before honoring tool input.
body: 'Run-scoped tools such as orbit.state.* cross a trust boundary: model-provided JSON is untrusted, even when it includes plausible run_id or state_dir values. Resolve the active run from OrbitTaskScope/runtime-owned context first, reject mismatches, and canonicalize/contain-check any explicit path against the current workspace job-runs root and active run before reading or writing state files.'
