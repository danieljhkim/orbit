summary: Avoid target-term cross products when populating graph source mention indexes
body: 'While implementing ORB-00380, a first pass built `source_mention` by checking every non-identifier target symbol against every leaf/file source. The unit suite exposed the problem through `pack_regression_selector_opens_from_branch_ref_layout`: large fixture graph persistence stalled because the work was O(source nodes × target symbols). Populate source indexes by extracting terms from each source once, then query those terms, so build cost scales with source size rather than definition count times source size.'
