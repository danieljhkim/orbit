summary: Filter every host-provided orbit.graph.* schema before appending MCP graph wrappers
body: The MCP adapter owns the advertised `orbit.graph.*` surface. When `OrbitToolServer::combined_tool_schemas` only filtered names known to the current graph wrapper registry, stale host schemas such as the removed `orbit.graph.pack` could leak into `tools/list`. Filter all host schemas with the `orbit.graph.` prefix first, then append the adapter's wrapper schemas from `graph_tool_schemas()`, and keep a regression test with a legacy host schema.
