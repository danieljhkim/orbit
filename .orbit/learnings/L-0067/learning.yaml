summary: Don't place Rust test fixtures or test-module files under .gitignore-hidden dir names (`.orbit/`, `build/`) — `git add -A` silently skips them while local tests pass. Use a tracked neutral dir name; check `git status --ignored` if a new test file is missing from the diff.
body: |-
  The repo's ignore rules hide several directory names anywhere in the tree (notably `.orbit/` and a broad `build/` rule). A test fixture payload or Rust test module placed under such a path is silently skipped by `git add -A` even though local tests pass and the file sits under `src/`.

  - Fixtures modeling Orbit workspace state: don't nest them under a literal `.orbit/` dir. Use a tracked neutral name (e.g. `orbit/`) and have the test copy it into a temp workspace as `.orbit/` at runtime.
  - A Rust module named `build` (e.g. `.../pipeline/build/tests/mod.rs`) is caught by the `build/` ignore rule. Keep tiny tests inline, or place the test module at a non-ignored path and wire it with `#[path = ...]`.
  - When a newly created test file does not appear in the diff, run `git status --ignored` to confirm it isn't being hidden.

  Consolidates the duplicate gitignore-hiding gotcha previously in L-0001 (ORB-00081, fixtures) and L-0032 (ORB-00215, build/ modules).
