summary: Unset Orbit managed-run identity env before running full CLI audit tests directly.
body: When running `make ci` from inside an Orbit managed agent run, inherited variables such as `ORBIT_AGENT_MODEL=gpt-5.5` can change CLI audit metadata defaults. In ORB-00377 this made `tool_run_audit_meta_uses_agent_role_without_identity` report the managed model instead of the test's expected `agent` role. For local validation, run the full gate with the managed-run identity variables unset, or interpret this failure as environment leakage rather than a behavior regression.
