summary: Before debugging Orbit process-identity/job-owner test failures, verify `ps` is permitted in the sandbox — Codex/sandboxed macOS can deny `ps` (operation not permitted), making identity probes return Unavailable and ps-dependent tests fail with no code regression.
body: |-
  When job-owner identity or process-identity tests fail with missing/`owner_identity_mismatch` tokens, first check whether `ps` runs in the active sandbox before suspecting Orbit code. The Codex exec environment (and some sandboxed macOS runs) can deny `ps` execution (`ps -p $$ -o lstart=` → `operation not permitted`), which makes `probe_process_start_identity` return `Unavailable`, so identity tokens can't be persisted and cancellation reports `owner_identity_mismatch`. This is a validation-environment issue, not a product regression. Run targeted non-ps tests for signal and record the ps-denial blocker separately from task regressions.

  Consolidates the duplicate guidance previously in L-0004 (ORB-00093) and L-0025 (ORB-00199).
